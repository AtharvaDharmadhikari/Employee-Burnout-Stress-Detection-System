<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — WellnessAI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:460px">
    <div class="auth-logo">🧠</div>
    <div class="auth-title">Create Account</div>
    <div class="auth-sub">Register to access the wellness platform</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2" style="font-size:0.85rem">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register_page') }}">
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Employee ID *</label>
          <input type="text" name="emp_id" class="form-control" placeholder="EMP001" required>
        </div>
        <div class="col-6">
          <label class="form-label">Department</label>
          <input type="text" name="department" class="form-control" placeholder="Engineering" value="General">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Full Name *</label>
        <input type="text" name="name" class="form-control" placeholder="e.g. John Smith" required>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Password *</label>
          <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required>
        </div>
        <div class="col-6">
          <label class="form-label">Confirm Password *</label>
          <input type="password" name="confirm_pw" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">HR Access Code
          <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:0.78rem;color:#94a3b8">(leave blank if employee)</span>
        </label>
        <input type="password" name="hr_code" class="form-control" placeholder="Only HR managers need this">
      </div>
      <button type="submit" class="btn-primary-custom w-100">
        <i class="bi bi-person-plus me-1"></i> Create Account
      </button>
    </form>

    <div class="auth-divider mt-4">already have an account?</div>
    <a href="{{ url_for('login_page') }}" class="btn-outline-custom w-100 mt-3 d-block text-center text-decoration-none">
      ← Back to Sign In
    </a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
